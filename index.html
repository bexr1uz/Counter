<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <title>Counter</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .container {
            width: 250px;
            margin: 50px auto;
            padding: 20px;
            border: 2px solid #000;
            text-align: center;
            border-radius: 10px;
            transition: 0.3s;
        }

        button {
            margin: 5px;
            padding: 10px 15px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="container" id="box">
        <h2>Counter</h2>

        <p id="count">0</p>

        <button class="plus" id="btnplus">+</button>
        <button class="minus" id="btnminus">-</button>
        <button class="reset" id="btnreset">Reset</button>
        <br><br>
        <button id="colorBtn">Rangni o'zgartir</button>
    </div>

    <script>
        document.getElementById("btnplus").addEventListener("click", increaseCount);
        document.getElementById("btnminus").addEventListener("click", decreaseCount);
        document.getElementById("btnreset").addEventListener("click", resetCount);

        let count = 0;

        function updateCount() {
            document.getElementById("count").innerHTML = count;
        }

        function increaseCount() {
            count++;
            localStorage.setItem("count", count);
            updateCount();
        }

        function decreaseCount() {
            if (count > 0)
                count--;
            localStorage.setItem("count", count);
            updateCount();
        }

        function resetCount() {
            count = 0;
            localStorage.setItem("count", count);
            updateCount();
        }

        window.onload = function () {
            let saved = localStorage.getItem("count");
            if (saved !== null) {
                count = Number(saved);
            }
            updateCount();
        }

        
        const box = document.getElementById("box");
        const colorBtn = document.getElementById("colorBtn");

        colorBtn.addEventListener("click", function () {
            box.style.backgroundColor = "blue";
        });

    </script>

</body>
</html>
