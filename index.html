<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Counter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Counter</h2>

    <p id="count">0</p>

    <button class="plus" onclick="increaseCount()">+</button>
    <button class="minus" onclick="decreaseCount()">-</button>
    <button class="reset" onclick="resetCount()">Reset</button>
</div>

<script>
let count = 0;

function updateCount() {
  document.getElementById("count").innerHTML = count;
}

function increaseCount() {
  count++;
  localStorage.setItem("count", count);
  updateCount();
}

function decreaseCount() {
  if(count > 0)
  count--;
  localStorage.setItem("count", count);
  updateCount();
}

function resetCount() {
  count = 0;
  localStorage.setItem("count", count);
  updateCount();
}

window.onload = function(){
  let saved = localStorage.getItem("count");
  if (saved !== null) {
    count = Number(saved);
  }
  updateCount();
}
</script>

</body>
</html>
